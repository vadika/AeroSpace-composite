name: build-composite

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

concurrency:
  group: build-composite
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Checkout upstream for CI helper scripts
        uses: actions/checkout@v6
        with:
          repository: nikitabobko/AeroSpace
          path: upstream

      - name: Select supported Xcode
        run: ./upstream/.github/gh-actions-runner-xcode-select.sh

      - name: Install release build dependencies
        run: brew install bash fish xcbeautify swiftly

      - name: Initialize swiftly
        run: swiftly init --skip-install --assume-yes --verbose && swiftly install

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build and publish composite release
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/release-composite.sh
